<!DOCTYPE html>
<html lang="ko">
<head>
    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;

    <meta charset="UTF-8">

    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <nav class="navbar">
                <div class="nav-logo">
                    <a href="/" data-i18n="site_logo">British Daily Bible</a>
                </div>
                <ul class="nav-links">
                    <li><a href="/" data-i18n="navHome">Home</a></li>
                    <li><a href="/disciple-test" data-i18n="navDisciples">AI Test</a></li>
                    <li><a href="/faith-checkup" data-i18n="navCheck">Check</a></li>
                    <li><a href="/community" data-i18n="navCommunity">Community</a></li>
                    <li><a href="/chat" data-i18n="navPaulAI">Paul AI</a></li>
                    <li><a href="/blog" data-i18n="navBlog">Blog</a></li>
                </ul>
                <div class="lang-switcher">
                    <select class="lang-selector" id="lang-select" style="padding: 5px 10px; border-radius: 15px; background: white; border: 1px solid #ddd; color: #333; font-family: inherit;">
                        <option value="ko">KO</option>
                        <option value="en">EN</option>
                    </select>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <div class="container dashboard-container">
            <h1 data-i18n="navCheck">신앙 점검 대시보드</h1>
            
            <section class="summary-section card" style="margin-bottom: 30px;">
                <h2 data-i18n="navCheck">📊 공동체 영적 건강도 (평균)</h2>
                <div style="max-width: 500px; margin: 0 auto;">
                    <canvas id="averageFaithChart"></canvas>
                </div>
                <p id="totalCount" style="text-align: center; margin-top: 15px; color: #666; font-weight: bold;"></p>
            </section>

            <div id="data-table-container" class="card">
                <h2 data-i18n="navCheck">📋 최근 점검 기록</h2>
                <div style="overflow-x: auto;">
                    <table id="faithResultsTable">
                        <thead>
                            <tr>
                                <th>이름</th>
                                <th>영적 민감성</th>
                                <th>우선순위</th>
                                <th>말씀 수용성</th>
                                <th>실천적 순종</th>
                                <th>공동체 의식</th>
                                <th>사랑의 나눔</th>
                                <th>제출일</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Data will be inserted here by JavaScript -->
                        </tbody>
                    </table>
                </div>
                <p id="loadingMessage">데이터를 불러오는 중...</p>
                <p id="errorMessage" style="color: red; display: none;">데이터를 불러오지 못했습니다.</p>
            </div>
            
            <button onclick="window.location.href='/faith-checkup'" style="margin-top:20px; width: 100%;">나도 점검하기</button>
        </div>
    </main>
    <footer>
        <div class="container">
            <div class="footer-content">
                <p data-i18n="footer_rights">© 2026 British Daily Bible. All rights reserved.</p>
                <nav class="footer-nav">
                    <a href="/privacy">Privacy</a>
                    <a href="/terms">Terms</a>
                    <a href="/about">About</a>

    <script type="module" src="firebase-firestore-service.js"></script>
    <script type="module" src="main.js" defer></script>
    <script src="lang.js"></script>
    <script type="module" src="./faith-dashboard.js"></script>
</body>
</html>
