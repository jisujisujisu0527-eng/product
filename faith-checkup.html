<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <title data-i18n="navCheck">Faith Check | British Daily Bible</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <nav class="navbar">
                <div class="nav-logo"><a href="/" data-i18n="site_logo">British Daily Bible</a></div>
                <ul class="nav-links">
                    <li><a href="/" data-i18n="navHome">Home</a></li>
                    <li><a href="/disciple-test" data-i18n="navDisciples">AI Test</a></li>
                    <li><a href="/faith-checkup" class="active" data-i18n="navCheck">Check</a></li>

                    <li><a href="/blog" data-i18n="navBlog">Blog</a></li>

                <div class="lang-switcher">
                    <select class="lang-selector" aria-label="Select Language" style="padding: 8px 12px; border-radius: 20px; border: 1px solid #ddd; background: white;">
                        <option value="ko">KO</option>
                        <option value="en">EN</option>

    <main class="container" style="padding: 60px 0;">

            <p style="text-align: center; color: #7F8C8D; margin-bottom: 30px;" data-i18n="checkSub">매주 자신의 신앙 상태를 점검하고 하나님과의 관계를 돌아보세요.</p>
            <!-- 자가진단 로직 준비 중 -->

                <i class="fas fa-tools fa-3x" style="color: #B08968; margin-bottom: 20px;"></i>
                <p>신앙 점검 기능은 현재 고도화 작업 중입니다.</p>
                <button class="primary-btn" onclick="location.href='/'" style="margin-top: 20px;" data-i18n="checkBtn">신앙 점검 시작하기</button>
            </div>
        </div>
    </main>

    <script src="translations.js"></script>
    <script src="main.js" defer></script>
    <script src="lang.js"></script>
